services:
    web:
      command: ["uv", "run", "fastapi", "dev", "--host", "0.0.0.0", "app/main.py"]
      ports:
        - "8000:8000"
      environment:
        - UV_NO_DEV=1
      user: root
      develop:
        watch:
          - action: sync
            path: .
            target: /app
            ignore:
              - .venv/
          - action: rebuild
            path: ./uv.lock